name: childguard
description: "ChildGuard - Child Safety Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase packages
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  # Location tracking
  geolocator: ^13.0.2
  # Map display (OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1
  intl_phone_field: ^3.2.0
  flutter_contacts: ^2.0.2
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.9.0+3
  lottie: ^3.3.3
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  introduction_screen: ^4.0.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
