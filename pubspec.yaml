name: childguard
description: "ChildGuard - Child Safety Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase packages
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  # Location tracking
  geolocator: ^13.0.2
  # Map display (OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Local storage (onboarding check ke liye)
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/logo.png"
